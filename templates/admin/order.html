{% extends 'base.html' %}

{% block header %}
    <title>admin dashboard | order</title>
{% endblock %}

{% block body %}
    <form action="#" method="post">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
        <select name="status">
    <option value="paid" {% if cart.status == "paid" %} selected {% endif %}>پرداخت شده</option>
    <option value="sent" {% if cart.status == "sent" %} selected {% endif %}>ارسال شده</option>
    <option value="reject" {% if cart.status == "reject" %} selected {% endif %}>رد شده</option>
        </select>
        <input type="submit" value="تغیر">
    </form>

    <div>
    {% for item in cart.cart_items %}
        {{ item.product.name }} <br>
    {% endfor %}
    </div>
{% endblock %}
