{% extends 'base.html' %}
{% block header %}
    <title>admin edit-product </title>
{% endblock %}

{% block body %}

    <img style="width: 20px;" src="/static/cover/{{ product.id }}.jpg">
    <form action="#" method="post" enctype="multipart/form-data">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}"/><br>
        <label >cover:</label><input type="file" name="cover"><br>
        <input type="text" name="name" value="{{ product.name }}" placeholder="نام محصول"><br>
        <input type="number" name="price" value="{{ product.price }}" placeholder="قیمت محصول"><br>
        <textarea name="description"  placeholder="توضیحات {{ product.description }}"></textarea><br>
        <label>:فعال</label> <input type="checkbox" name="active" value="1" {% if product.active %}checked{% endif %}><br><br>
        <button>submit</button>

    </form>
{% endblock %}
